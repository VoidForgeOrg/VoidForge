services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: voidforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voidforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: dockerfiles/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__Marten: "Host=postgres;Port=5432;Database=voidforge;Username=postgres;Password=${POSTGRES_PASSWORD}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
